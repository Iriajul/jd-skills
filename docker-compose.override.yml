# =============================================================================
# Local Development Override
# =============================================================================
# Docker Compose auto-merges this file on top of docker-compose.yml when you
# run: docker compose up
#
# Production (VPS): docker compose -f docker-compose.yml up -d
# Local dev:        docker compose up          ← picks up this file automatically
# =============================================================================

services:

  # ── FastAPI — hot reload ───────────────────────────────────────────────────
  web:
    build:
      args:
        REQUIREMENTS_FILE: development.txt   # installs watchfiles, ipython, etc.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src                       # live source mount — no rebuild needed
    ports:
      - "8002:8000"                          # 8000+8001 taken by other projects
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  # ── Expose DB port for local tools (TablePlus, DBeaver, psql) ─────────────
  # 5432 = native PostgreSQL, 5433-5435 = other Docker projects
  db:
    ports:
      - "5436:5432"

  # ── Expose Redis for local inspection (redis-cli, RedisInsight) ───────────
  redis:
    ports:
      - "6381:6379"                          # 6379+6380 taken by other projects

  # ── Celery general worker — debug log, fewer workers locally ──────────────
  celery-worker:
    build:
      args:
        REQUIREMENTS_FILE: development.txt
    command: >
      celery -A workers.celery_app worker
      -Q default,job_discovery
      --loglevel=DEBUG
      --concurrency=2
    volumes:
      - ./src:/app/src

  # ── Celery AI worker — single process locally (LLM calls are heavy) ───────
  celery-ai-worker:
    build:
      args:
        REQUIREMENTS_FILE: development.txt
    command: >
      celery -A workers.celery_app worker
      -Q ai_tasks
      --loglevel=DEBUG
      --concurrency=1
    volumes:
      - ./src:/app/src

  # ── Celery Beat ───────────────────────────────────────────────────────────
  celery-beat:
    build:
      args:
        REQUIREMENTS_FILE: development.txt
    volumes:
      - ./src:/app/src

  # ── Frontend — Next.js dev server with hot reload ─────────────────────────
  # Overrides the production frontend build with a dev image + live source mount.
  # Access at http://localhost:3001 (browser calls the API at localhost:8002 via
  # frontend/.env.local). Auto-restarts; no separate terminal needed.
  frontend:
    build:
      dockerfile: Dockerfile.dev
    command: npm run dev -- --port 3000 --hostname 0.0.0.0
    volumes:
      - ./frontend:/app          # live source — edits hot-reload
      - /app/node_modules        # keep the image's node_modules (don't shadow with host)
      - /app/.next               # build cache stays in the container
    ports:
      - "3001:3000"              # host 3001 → container 3000 (matches your current URL)
    environment:
      - WATCHPACK_POLLING=true   # reliable file watching across the bind mount
      - CHOKIDAR_USEPOLLING=true
