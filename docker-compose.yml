# ─── Networks ─────────────────────────────────────────────────────────────────
# All services communicate over a single private bridge network.
# No internal service (db, redis, qdrant) exposes ports to the host in production.
# For local development, see the port comments marked [DEV ONLY].
networks:
  app_network:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  static_volume:
  media_volume:
  postgres_data:
  redis_data:
  qdrant_data:

services:

  # ═══════════════════════════════════════════════════════════════
  # APPLICATION
  # ═══════════════════════════════════════════════════════════════

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - static_volume:/app/src/static
      - media_volume:/app/src/media
    expose:
      - "8000"
    env_file:
      - ./src/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  # ═══════════════════════════════════════════════════════════════
  # REVERSE PROXY
  # ═══════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"   # 80/443 taken by existing project on VPS; access via :8080
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/src/static
      - media_volume:/app/src/media
    depends_on:
      - web
    networks:
      - app_network

  # ═══════════════════════════════════════════════════════════════
  # DATABASES
  # ═══════════════════════════════════════════════════════════════

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./src/.env
    environment:
      - POSTGRES_DB=${DB_NAME:-atsfriendly}   # already set in .env, fallback matches
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    # [DEV ONLY] Uncomment to access PostgreSQL from host machine:
    # ports:
    #   - "5432:5432"

  # Vector database — stores resume chunks, job embeddings, skill profiles.
  # Pinned to a specific version for reproducibility; upgrade deliberately.
  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    # Qdrant's minimal Debian image has no curl/wget — a CMD health check isn't
    # possible without installing extra tools. Qdrant starts in <2s and is
    # self-stable, so we rely on restart: unless-stopped for recovery instead.
    networks:
      - app_network
    # Qdrant dashboard available at http://localhost:6333/dashboard
    ports:
      - "6333:6333"

  # ═══════════════════════════════════════════════════════════════
  # CACHE / MESSAGE BROKER
  # ═══════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Persist data to disk so the task queue survives restarts.
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network
    # [DEV ONLY] Uncomment to inspect Redis from host:
    # ports:
    #   - "6379:6379"

  # ═══════════════════════════════════════════════════════════════
  # CELERY — General Worker
  # Handles: default tasks, job discovery scraping, DB writes.
  # Kept separate from AI tasks so I/O-bound scraping never blocks
  # long-running LLM inference.
  # ═══════════════════════════════════════════════════════════════

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
      -Q default,job_discovery
      --loglevel=INFO
      --concurrency=4
    env_file:
      - ./src/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  # ═══════════════════════════════════════════════════════════════
  # CELERY — AI Worker
  # Handles: LangGraph agent tasks, RAG pipeline, LLM inference,
  # resume generation, cover letter, interview prep.
  # Lower concurrency (2) because LLM calls are CPU/memory heavy.
  # Depends on Qdrant being healthy before it starts.
  # ═══════════════════════════════════════════════════════════════

  celery-ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A workers.celery_app worker
      -Q ai_tasks
      --loglevel=INFO
      --concurrency=2
    env_file:
      - ./src/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - app_network

  # ═══════════════════════════════════════════════════════════════
  # CELERY BEAT — Periodic Task Scheduler
  # Triggers: daily job discovery, weekly skill gap analysis.
  # Only ONE instance should ever run; never scale this service.
  # ═══════════════════════════════════════════════════════════════

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A workers.celery_app beat
      --loglevel=INFO
      --scheduler redbeat.RedBeatScheduler
    env_file:
      - ./src/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
